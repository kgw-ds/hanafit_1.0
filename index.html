<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>하나핏 (HanaFit) · UI Kit — Final Handoff</title>

  <link rel="stylesheet" href="styles.css">
  <style>
    html, body {
      margin: 0; padding: 0; background: #EFEEF3;
      font-family: var(--font-body); color: var(--fg1);
      -webkit-font-smoothing: antialiased; height: 100vh; overflow: hidden;
    }
    #__bundler_err { display: none !important; }
    *::-webkit-scrollbar { display: none; width: 0; height: 0; }
    * { scrollbar-width: none; -ms-overflow-style: none; }

    .hana-press { transition: transform 120ms ease-out; }
    .hana-press:active { transform: scale(0.98); }

    .stage {
      height: 100vh; display: flex; align-items: center; justify-content: center;
      gap: 28px; padding: 24px;
    }
    .side {
      display: flex; flex-direction: column; gap: 8px;
      width: 360px; max-height: calc(100vh - 48px);
      overflow-y: auto; padding-right: 4px;
    }
    .side h1 {
      font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
      color: #22262B; margin: 0 0 2px;
    }
    .side .desc { font-size: 12px; color: #5E6976; line-height: 1.45; }
    .group-label {
      margin-top: 6px; padding: 0 2px;
      font-size: 10px; color: #8F97A0;
      text-transform: uppercase; letter-spacing: 0.08em;
      font-family: 'SF Mono', Menlo, monospace; font-weight: 600;
    }
    .jump { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .jump button {
      text-align: left; padding: 8px 10px; border-radius: 8px;
      background: #FFFFFF; border: 1px solid #E8E8E8;
      font-size: 11px; line-height: 1.35; color: #22262B; cursor: pointer;
      font-family: inherit; letter-spacing: -0.02em;
      transition: all 120ms ease-out;
      min-height: 38px; display: flex; align-items: center;
    }
    .jump button .num {
      display: inline-block; font-weight: 700; color: #00A38D;
      margin-right: 6px; min-width: 18px; font-size: 11px;
    }
    .jump button:hover { border-color: #00A38D; background: #F8FBFA; }
    .jump button.active {
      background: #00A38D; color: #fff; border-color: #00A38D;
    }
    .jump button.active .num { color: #fff; }

    .device-wrap {
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .credit {
      font-size: 10px; color: #8F97A0; margin-top: 8px;
      line-height: 1.5; padding: 0 2px;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="side">
      <h1>하나핏 · 최종 핸드오프</h1>
      <div class="desc">하나원큐 앱인앱 청년 금융 (390×844) · 페르소나: 최서연(만 23세, 서울 자취)</div>

      <div class="group-label">① 진단까지</div>
      <div class="jump" id="jump">
        <button data-go="home"><span class="num">1</span>하나원큐 홈</button>
        <button data-go="intro"><span class="num">2</span>서비스 소개</button>
        <button data-go="consent"><span class="num">3</span>마이데이터 동의</button>
        <button data-go="manual-input"><span class="num">3-1</span>직접 입력</button>
        <button data-go="analyzing"><span class="num">4</span>분석 중</button>
        <button data-go="result"><span class="num">5</span>진단 결과 홈</button>
      </div>

      <div class="group-label">② 혜택 탐색</div>
      <div class="jump">
        <button data-go="list"><span class="num">6</span>맞춤 혜택</button>
        <button data-go="detail"><span class="num">7</span>혜택 상세</button>
        <button data-go="checklist"><span class="num">7-1</span>신청 체크리스트</button>
        <button data-go="official-source"><span class="num">7-2</span>공식 출처</button>
        <button data-go="search"><span class="num">8</span>혜택 검색</button>
        <button data-go="calendar"><span class="num">9</span>캘린더</button>
      </div>

      <div class="group-label">③ AI 상담</div>
      <div class="jump">
        <button data-go="aichat-new"><span class="num">10</span>AI 첫 진입</button>
        <button data-go="aianswer-new"><span class="num">11</span>AI 대화</button>
        <button data-go="ai-decision"><span class="num">11-1</span>AI 의사결정</button>
        <button data-go="ai-crisis"><span class="num">11-2</span>AI 위기대응</button>
        <button data-go="history"><span class="num">12</span>상담 이력</button>
      </div>

      <div class="group-label">④ 또래 따라하기</div>
      <div class="jump">
        <button data-go="peer"><span class="num">13</span>또래 비교</button>
        <button data-go="follow"><span class="num">14</span>또래 따라하기</button>
        <button data-go="mentor"><span class="num">15</span>멘토 변경</button>
        <button data-go="mentor-detail"><span class="num">15-1</span>멘토 상세</button>
      </div>

      <div class="group-label">⑤ 챌린지 (가입 플로우)</div>
      <div class="jump">
        <button data-go="boardInit"><span class="num">16</span>보드 0/5</button>
        <button data-go="missionDetail"><span class="num">17</span>미션 상세</button>
        <button data-go="productDetail"><span class="num">17-1</span>적금 상세</button>
        <button data-go="easyJoin"><span class="num">17-2</span>간편 가입</button>
        <button data-go="missionJoin"><span class="num">18</span>가입 진행</button>
        <button data-go="missionDone"><span class="num">19</span>미션 완료</button>
      </div>

      <div class="group-label">⑥ 진행 → 달성</div>
      <div class="jump">
        <button data-go="boardActive"><span class="num">20</span>보드 3/5</button>
        <button data-go="challengeDone"><span class="num">21</span>5/5 달성</button>
      </div>

      <div class="group-label">⑦ 재방문</div>
      <div class="jump">
        <button data-go="revisit"><span class="num">22</span>재방문 홈</button>
        <button data-go="savings-report"><span class="num">22-1</span>절감 리포트</button>
        <button data-go="notifications"><span class="num">23</span>알림센터</button>
      </div>

      <div class="group-label">⑧ 설정</div>
      <div class="jump">
        <button data-go="settings"><span class="num">25</span>설정·마이데이터</button>
      </div>

      <div class="credit">
        🎨 민트 그라데이션 · 보라 글래스 (AI) · 그린 (챌린지)<br/>
        Green #00A38D · Purple #7567D5
      </div>
    </div>

    <div class="device-wrap">
      <div id="device"></div>
    </div>
  </div>

  <script>
    (function killBundlerErr() {
      const remove = () => {
        const el = document.getElementById('__bundler_err');
        if (el) el.remove();
      };
      remove();
      new MutationObserver(remove).observe(document.documentElement, {
        childList: true, subtree: true,
      });
    })();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="hana1q-app/ios-frame.jsx"></script>
  <script type="text/babel" src="hana1q-app/components.jsx"></script>

  <script type="text/babel" src="hanafit/components.jsx"></script>
  <script type="text/babel" src="hanafit/componentsV2.jsx"></script>
  <script type="text/babel" src="hanafit/Screen1Home.jsx"></script>
  <script type="text/babel" src="hanafit/Screen2Intro.jsx"></script>
  <script type="text/babel" src="hanafit/Screen3Consent.jsx"></script>
  <script type="text/babel" src="hanafit/Screen4Analyzing.jsx"></script>
  <script type="text/babel" src="hanafit/Screen5ResultHome.jsx"></script>
  <script type="text/babel" src="hanafit/Screen6BenefitList.jsx"></script>
  <script type="text/babel" src="hanafit/Screen7BenefitDetail.jsx"></script>
  <script type="text/babel" src="hanafit/Screen26ApplicationChecklist.jsx"></script>
  <script type="text/babel" src="hanafit/Screen34SupportScreens.jsx"></script>
  <script type="text/babel" src="hanafit/Screen10PeerCompare.jsx"></script>
  <script type="text/babel" src="hanafit/Screen11FollowIntro.jsx"></script>
  <script type="text/babel" src="hanafit/Screen16ChallengeBoardInit.jsx"></script>
  <script type="text/babel" src="hanafit/Screen17MissionDetail.jsx"></script>
  <script type="text/babel" src="hanafit/Screen18MissionProgressJoin.jsx"></script>
  <script type="text/babel" src="hanafit/Screen19MissionComplete.jsx"></script>
  <script type="text/babel" src="hanafit/Screen21ChallengeBoardActive.jsx"></script>
  <script type="text/babel" src="hanafit/Screen22ChallengeComplete.jsx"></script>
  <script type="text/babel" src="hanafit/Screen18RevisitHome.jsx"></script>
  <script type="text/babel" src="hanafit/Screen19Notifications.jsx"></script>
  <script type="text/babel" src="hanafit/Screen22Search.jsx"></script>
  <script type="text/babel" src="hanafit/Screen23Calendar.jsx"></script>
  <script type="text/babel" src="hanafit/Screen24MentorPicker.jsx"></script>
  <script type="text/babel" src="hanafit/Screen25ChatHistory.jsx"></script>
  <script type="text/babel" src="hanafit/Screen27ProductDetail.jsx"></script>
  <script type="text/babel" src="hanafit/Screen28EasyJoin.jsx"></script>
  <script type="text/babel" src="hanafit/Screen29AIChatNewIntro.jsx"></script>
  <script type="text/babel" src="hanafit/Screen30AIChatNewAnswer.jsx"></script>
  <script type="text/babel" src="hanafit/Screen31MentorDetail.jsx"></script>
  <script type="text/babel" src="hanafit/Screen32SavingsReport.jsx"></script>
  <script type="text/babel" src="hanafit/Screen33AIDecision.jsx"></script>

  <script type="text/babel">
    const Root = () => {
      const [screen, setScreen] = React.useState("home");
      const [pendingQuery, setPendingQuery] = React.useState(null);
      React.useEffect(() => { window.__hfSet = setScreen; }, []);

      let body = null;
      // ━━━ Onboarding ━━━
      if (screen === "home") body = <HanafitHomeScreen onOpen={setScreen}/>;
      else if (screen === "intro") body = <IntroScreen
        onBack={() => setScreen("home")}
        onNext={() => setScreen("consent")}
        onDirect={() => setScreen("analyzing")}/>;
      else if (screen === "consent") body = <ConsentScreen
        onBack={() => setScreen("intro")}
        onNext={() => setScreen("analyzing")}
        onDirect={() => setScreen("manual-input")}/>;
      else if (screen === "manual-input") body = <ManualInputScreen
        onBack={() => setScreen("consent")}
        onAnalyze={() => setScreen("analyzing")}
        onOpen={setScreen}/>;
      else if (screen === "analyzing") body = <AnalyzingScreen
        onDone={() => setScreen("result")}/>;
      else if (screen === "result") body = <ResultHomeScreen onOpen={setScreen}/>;

      // ━━━ Benefit exploration ━━━
      else if (screen === "list") body = <BenefitListScreen
        onBack={() => setScreen("result")}
        onOpenDetail={() => setScreen("detail")}
        onOpen={setScreen}/>;
      else if (screen === "detail") body = <BenefitDetailScreen
        onBack={() => setScreen("list")}
        onChecklist={() => setScreen("checklist")}
        onAskAI={() => setScreen("aichat-new")}
        onOpen={setScreen}/>;
      else if (screen === "checklist") body = <ApplicationChecklistScreen
        onBack={() => setScreen("detail")}
        onAskAI={() => setScreen("aichat-new")}
        onOpen={setScreen}/>;
      else if (screen === "official-source") body = <OfficialSourceScreen
        onBack={() => setScreen("detail")}
        onOpen={setScreen}/>;
      else if (screen === "search") body = <SearchScreen
        onBack={() => setScreen("revisit")}
        onOpen={setScreen}/>;
      else if (screen === "calendar") body = <CalendarScreen
        onBack={() => setScreen("revisit")}
        onOpen={setScreen}/>;

      // ━━━ AI consultation (new) ━━━
      else if (screen === "aichat-new") body = <AIChatNewIntroScreen
        onBack={() => setScreen("result")}
        onSend={(q) => { setPendingQuery(q); setScreen("aianswer-new"); }}
        onOpen={setScreen}/>;
      else if (screen === "ai-decision") body = <AIDecisionScreen
        onBack={() => setScreen("aichat-new")}
        onOpen={setScreen}/>;
      else if (screen === "ai-crisis") body = <AICrisisScreen
        onBack={() => setScreen("aichat-new")}
        onOpen={setScreen}/>;
      else if (screen === "aianswer-new") body = <AIChatNewAnswerScreen
        onBack={() => { setPendingQuery(null); setScreen("aichat-new"); }}
        onOpen={setScreen}
        initialQuery={pendingQuery}/>;
      else if (screen === "history") body = <ChatHistoryScreen
        onBack={() => setScreen("notifications")}
        onOpen={setScreen}/>;

      // ━━━ Peer · Mentor ━━━
      else if (screen === "peer") body = <PeerCompareScreen
        onBack={() => setScreen("result")}
        onOpen={setScreen}/>;
      else if (screen === "follow") body = <FollowIntroScreen
        onBack={() => setScreen("peer")}
        onNext={() => setScreen("boardInit")}
        onOtherMentor={() => setScreen("mentor")}/>;
      else if (screen === "mentor") body = <MentorPickerScreen
        onBack={() => setScreen("boardActive")}
        onChange={() => setScreen("boardActive")}
        onMentorDetail={() => setScreen("mentor-detail")}/>;
      else if (screen === "mentor-detail") body = <MentorDetailScreen
        onBack={() => setScreen("mentor")}
        onFollow={() => setScreen("boardActive")}/>;

      // ━━━ Challenge (join flow) ━━━
      else if (screen === "boardInit") body = <ChallengeBoardInitScreen
        onBack={() => setScreen("follow")}
        onOpenMission={() => setScreen("missionDetail")}/>;
      else if (screen === "missionDetail") body = <MissionDetailScreen
        onBack={() => setScreen("boardInit")}
        onStart={() => setScreen("productDetail")}
        onAskAI={() => setScreen("ai-decision")}/>;
      else if (screen === "productDetail") body = <ProductDetailScreen
        onBack={() => setScreen("missionDetail")}
        onJoin={() => setScreen("easyJoin")}
        onAskAI={() => setScreen("aichat-new")}/>;
      else if (screen === "easyJoin") body = <EasyJoinScreen
        onBack={() => setScreen("productDetail")}
        onNext={() => setScreen("missionJoin")}/>;
      else if (screen === "missionJoin") body = <MissionProgressJoinScreen
        onBack={() => setScreen("easyJoin")}
        onComplete={() => setScreen("missionDone")}/>;
      else if (screen === "missionDone") body = <MissionCompleteScreen
        onClose={() => setScreen("revisit")}
        onNext={() => setScreen("boardActive")}/>;

      // ━━━ Active challenge ━━━
      else if (screen === "boardActive") body = <ChallengeBoardActiveScreen
        onBack={() => setScreen("revisit")}
        onOpenMission={() => setScreen("missionDetail")}
        onChangeMentor={() => setScreen("mentor")}/>;
      else if (screen === "challengeDone") body = <ChallengeCompleteScreen
        onBack={() => setScreen("revisit")}
        onNextMentor={() => setScreen("mentor")}
        onShare={() => setScreen("revisit")}/>;

      // ━━━ Revisit ━━━
      else if (screen === "revisit") body = <RevisitHomeScreen onOpen={setScreen}/>;
      else if (screen === "notifications") body = <NotificationsScreen
        onBack={() => setScreen("revisit")}
        onOpen={setScreen}/>;
      else if (screen === "savings-report") body = <SavingsReportScreen
        onBack={() => setScreen("revisit")}
        onOpen={setScreen}/>;
      else if (screen === "settings") body = <SettingsScreen
        onBack={() => setScreen("result")}
        onOpen={setScreen}/>;

      const showTab = (screen === "home");

      return (
        <IOSDevice width={390} height={844}>
          <div style={{
            width: "100%", height: "100%",
            display: "flex", flexDirection: "column", paddingTop: 50,
          }}>
            {body}
            {showTab && <TabBar active="home" onChange={() => {}}/>}
          </div>
        </IOSDevice>
      );
    };

    ReactDOM.createRoot(document.getElementById("device")).render(<Root/>);

    document.addEventListener("click", e => {
      const b = e.target.closest("[data-go]");
      if (!b) return;
      window.__hfSet && window.__hfSet(b.getAttribute("data-go"));
      document.querySelectorAll("[data-go]").forEach(el =>
        el.classList.toggle("active", el === b));
    });
    requestAnimationFrame(() => {
      document.querySelector("[data-go='home']")?.classList.add("active");
    });
  </script>
</body>
</html>
